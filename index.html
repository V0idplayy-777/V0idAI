<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VexAI</title>


  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f7f7f7;
      color: #222;
      margin: 0;
      padding: 0;
    }

    .wrapper {
      max-width: 600px;
      margin: 80px auto;
      padding: 24px;
      background-color: #ffffff;
      border: 1px solid #ddd;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 12px;
      font-weight: normal;
    }

    p {
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 18px;
    }

    .btn {
      display: inline-block;
      padding: 10px 16px;
      font-size: 14px;
      color: #ffffff;
      background-color: #2f5dff;
      text-decoration: none;
      border: 1px solid #2f5dff;
    }

    .btn:hover {
      background-color: #2448c9;
      border-color: #2448c9;
    }

    .note {
      font-size: 12px;
      color: #666;
      margin-top: 16px;
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <h1>R.I.P.</h1>

    <p>
      I stopped working on VexAI to focus more on my other chatbot "Overmind".
    </p>

    <a class="btn" href="https://v0idplayy-777.github.io/Overmind/">
      Visit overmind
    </a>

    <div class="note">
      If you are not redirected automatically, click the button above.
    </div>
  </div>
</body>
</html>
