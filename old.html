<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VexAI</title>
  <link rel="icon" type="image/png" href="oldfavicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --void: #020305;
      --abyss: #060810;
      --surface: #0b0d14;
      --raised: #10131d;
      --border: rgba(255,255,255,0.06);
      --border-bright: rgba(99,255,180,0.18);
      --glow: #63ffb4;
      --glow-dim: rgba(99,255,180,0.12);
      --glow-mid: rgba(99,255,180,0.35);
      --accent: #00ffaa;
      --accent2: #7b5fff;
      --text: #c8d6e5;
      --text-dim: #4a5568;
      --text-faint: #232b36;
      --red: #ff4d6d;
      --red-dim: rgba(255,77,109,0.12);
      --user-bg: #1a1d2e;
      --user-border: rgba(123,95,255,0.3);
      --user-text: #d4ccff;
      --radius: 4px;
      --font-mono: 'Space Mono', monospace;
      --font-ui: 'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--void);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: var(--font-mono);
      /* scanline overlay */
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0,0,0,0.18) 2px,
          rgba(0,0,0,0.18) 4px
        );
      cursor: crosshair;
    }

    /* subtle noise grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 740px;
      height: 100vh;
      background: var(--abyss);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    /* Vertical glow line on left edge */
    #app::before {
      content: '';
      position: absolute;
      left: -1px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, transparent 0%, var(--glow) 30%, var(--glow) 70%, transparent 100%);
      opacity: 0.4;
      animation: pulse-line 4s ease-in-out infinite;
      z-index: 10;
    }

    @keyframes pulse-line {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.6; }
    }

    /* ── HEADER ─────────────────────────────────────── */
    #header {
      padding: 0 20px;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    #header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glow), transparent);
      animation: scan-bottom 6s linear infinite;
    }

    @keyframes scan-bottom {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .logo-block {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-glyph {
      width: 30px;
      height: 30px;
      border: 1px solid var(--glow);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: var(--glow-dim);
      box-shadow: 0 0 10px var(--glow-dim), inset 0 0 8px var(--glow-dim);
    }

    .logo-glyph span {
      font-family: var(--font-ui);
      font-weight: 800;
      font-size: 12px;
      color: var(--glow);
      letter-spacing: -1px;
    }

    /* corner ticks */
    .logo-glyph::before, .logo-glyph::after {
      content: '';
      position: absolute;
      width: 5px; height: 5px;
    }
    .logo-glyph::before { top: -3px; right: -3px; border-top: 1px solid var(--glow); border-right: 1px solid var(--glow); }
    .logo-glyph::after  { bottom: -3px; left: -3px; border-bottom: 1px solid var(--glow); border-left: 1px solid var(--glow); }

    .title-group { display: flex; flex-direction: column; gap: 1px; }

    .title-group .main-title {
      font-family: var(--font-ui);
      font-weight: 800;
      font-size: 15px;
      color: #eef2ff;
      letter-spacing: 0.03em;
      line-height: 1;
    }

    .title-group .main-title span { color: var(--glow); }

    .title-group .ver {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* status pill */
    .status-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(99,255,180,0.07);
      border: 1px solid rgba(99,255,180,0.14);
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--glow);
      letter-spacing: 0.06em;
    }

    .status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--glow);
      box-shadow: 0 0 5px var(--glow);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* image counter */
    #img-counter {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #img-counter .counter-label {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      font-family: var(--font-mono);
      text-transform: uppercase;
    }

    #img-counter .pips {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    #img-counter .pip {
      width: 7px; height: 7px;
      border-radius: 1px;
      background: var(--accent2);
      box-shadow: 0 0 5px rgba(123,95,255,0.4);
      transition: all 0.25s;
    }

    #img-counter .pip.used {
      background: var(--text-faint);
      box-shadow: none;
    }

    #img-counter .pip.all-used {
      background: var(--red-dim);
      border: 1px solid var(--red);
      box-shadow: 0 0 4px var(--red);
    }

    #clear-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 10px;
      font-family: var(--font-mono);
      padding: 5px 11px;
      border-radius: var(--radius);
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    #clear-btn:hover {
      border-color: var(--red);
      color: var(--red);
      background: var(--red-dim);
    }

    /* ── MESSAGES ───────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scrollbar-width: thin;
      scrollbar-color: rgba(99,255,180,0.12) transparent;
    }

    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: rgba(99,255,180,0.15); border-radius: 2px; }

    .msg {
      display: flex;
      gap: 12px;
      max-width: 88%;
      animation: msgIn 0.25s cubic-bezier(0.22,1,0.36,1) both;
    }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* avatar */
    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-family: var(--font-ui);
      font-weight: 800;
      flex-shrink: 0;
      margin-top: 3px;
      letter-spacing: 0;
      position: relative;
    }

    .msg.user .avatar {
      background: rgba(123,95,255,0.15);
      border: 1px solid rgba(123,95,255,0.3);
      color: #c4b5fd;
    }

    .msg.assistant .avatar {
      background: var(--glow-dim);
      border: 1px solid var(--border-bright);
      color: var(--glow);
      box-shadow: 0 0 8px var(--glow-dim);
    }

    /* corner decorations on assistant avatar */
    .msg.assistant .avatar::before,
    .msg.assistant .avatar::after {
      content: '';
      position: absolute;
      width: 4px; height: 4px;
    }
    .msg.assistant .avatar::before { top: -2px; right: -2px; border-top: 1px solid var(--glow); border-right: 1px solid var(--glow); }
    .msg.assistant .avatar::after  { bottom: -2px; left: -2px; border-bottom: 1px solid var(--glow); border-left: 1px solid var(--glow); }

    /* bubble */
    .bubble {
      padding: 11px 15px;
      border-radius: var(--radius);
      font-size: 13.5px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: var(--font-mono);
      position: relative;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border: 1px solid var(--user-border);
      border-bottom-right-radius: 0;
    }

    .msg.assistant .bubble {
      background: var(--raised);
      color: var(--text);
      border: 1px solid var(--border);
      border-top-left-radius: 0;
    }

    /* thin glow top-bar on assistant messages */
    .msg.assistant .bubble::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--glow), transparent 60%);
      opacity: 0.3;
    }

    .bubble img {
      max-width: 340px;
      width: 100%;
      border-radius: var(--radius);
      margin-top: 10px;
      display: block;
      border: 1px solid var(--border-bright);
    }

    /* typing indicator */
    .typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 15px;
    }

    .typing span {
      width: 5px; height: 5px;
      border-radius: 1px;
      background: var(--glow);
      animation: blink-type 1.1s infinite;
      opacity: 0.3;
    }
    .typing span:nth-child(2) { animation-delay: 0.18s; }
    .typing span:nth-child(3) { animation-delay: 0.36s; }

    @keyframes blink-type {
      0%,80%,100% { opacity: 0.2; transform: scaleY(1); }
      40%         { opacity: 1;   transform: scaleY(1.5); }
    }

    .img-loading {
      color: var(--glow);
      font-size: 11.5px;
      font-family: var(--font-mono);
      letter-spacing: 0.04em;
    }

    /* regen button */
    .regen-btn {
      margin-top: 10px;
      background: transparent;
      border: 1px solid var(--border-bright);
      color: var(--glow);
      font-size: 11px;
      font-family: var(--font-mono);
      padding: 5px 13px;
      border-radius: var(--radius);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      letter-spacing: 0.06em;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .regen-btn:hover {
      background: var(--glow-dim);
      box-shadow: 0 0 10px var(--glow-dim);
    }

    .regen-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* code blocks */
    .code-block {
      margin: 8px 0;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid rgba(99,255,180,0.1);
    }

    .code-header {
      background: #0a0c12;
      padding: 5px 12px;
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--glow);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(99,255,180,0.08);
    }

    .copy-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 10px;
      font-family: var(--font-mono);
      padding: 0;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.15s;
    }

    .copy-btn:hover { color: var(--glow); }

    .code-block pre { margin: 0 !important; border-radius: 0 !important; background: #07090f !important; }
    .code-block pre code { font-size: 12.5px !important; }

    .bubble code:not(pre code) {
      background: rgba(99,255,180,0.08);
      color: var(--glow);
      padding: 1px 6px;
      border-radius: 2px;
      font-size: 12px;
      font-family: var(--font-mono);
      border: 1px solid rgba(99,255,180,0.14);
    }

    .error-bubble {
      background: #150a0b !important;
      border-color: rgba(255,77,109,0.25) !important;
      color: var(--red) !important;
    }

    .error-bubble::before { background: linear-gradient(90deg, var(--red), transparent 60%) !important; }

    /* ── INPUT AREA ─────────────────────────────────── */
    #input-area {
      padding: 14px 18px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      position: relative;
    }

    /* sweep glow on top edge */
    #input-area::before {
      content: '';
      position: absolute;
      top: -1px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glow), transparent);
      opacity: 0.2;
    }

    #user-input {
      flex: 1;
      background: var(--raised);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text);
      resize: none;
      max-height: 120px;
      min-height: 42px;
      outline: none;
      font-family: var(--font-mono);
      line-height: 1.6;
      transition: border-color 0.2s, box-shadow 0.2s;
      caret-color: var(--glow);
    }

    #user-input::placeholder { color: var(--text-faint); }

    #user-input:focus {
      border-color: var(--border-bright);
      box-shadow: 0 0 0 2px rgba(99,255,180,0.07), 0 0 14px rgba(99,255,180,0.05);
    }

    /* send button */
    #send-btn {
      width: 42px;
      height: 42px;
      border-radius: var(--radius);
      background: var(--raised);
      border: 1px solid var(--border-bright);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }

    #send-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, var(--glow-dim), transparent 70%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    #send-btn:hover {
      background: rgba(99,255,180,0.08);
      box-shadow: 0 0 14px var(--glow-dim);
    }

    #send-btn:hover::before { opacity: 1; }

    #send-btn:active { transform: scale(0.93); }

    #send-btn:disabled {
      border-color: var(--border);
      opacity: 0.35;
      cursor: not-allowed;
    }

    #send-btn svg {
      width: 15px;
      height: 15px;
      fill: var(--glow);
      position: relative;
      z-index: 1;
    }

    #send-btn:disabled svg { fill: var(--text-dim); }

    /* ── CONFIRM OVERLAY ────────────────────────────── */
    #confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(2,3,5,0.85);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #confirm-overlay.show { display: flex; }

    #confirm-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 28px 24px;
      width: 300px;
      text-align: center;
      position: relative;
      animation: popIn 0.2s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.92) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* corner ticks on confirm box */
    #confirm-box::before, #confirm-box::after {
      content: '';
      position: absolute;
      width: 8px; height: 8px;
    }
    #confirm-box::before { top: -1px; left: -1px; border-top: 1px solid var(--red); border-left: 1px solid var(--red); }
    #confirm-box::after  { bottom: -1px; right: -1px; border-bottom: 1px solid var(--red); border-right: 1px solid var(--red); }

    #confirm-box .confirm-title {
      font-family: var(--font-ui);
      font-weight: 700;
      font-size: 13px;
      color: var(--red);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    #confirm-box p {
      color: var(--text-dim);
      font-size: 12.5px;
      font-family: var(--font-mono);
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .confirm-btns { display: flex; gap: 8px; justify-content: center; }

    .confirm-btns button {
      padding: 8px 20px;
      border-radius: var(--radius);
      font-size: 11px;
      font-family: var(--font-mono);
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: all 0.15s;
    }

    #confirm-yes {
      background: var(--red-dim);
      border: 1px solid rgba(255,77,109,0.35);
      color: var(--red);
    }
    #confirm-yes:hover { background: rgba(255,77,109,0.22); box-shadow: 0 0 10px var(--red-dim); }

    #confirm-no {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    #confirm-no:hover { border-color: var(--border-bright); color: var(--text); }

    /* ── WATERMARK / GRID BG ────────────────────────── */
    #messages {
      background-image:
        linear-gradient(rgba(99,255,180,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,255,180,0.025) 1px, transparent 1px);
      background-size: 32px 32px;
      background-position: center center;
    }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="logo-block">
      <div class="logo-glyph"><span>Vx</span></div>
      <div class="title-group">
        <div class="main-title">VexAI</div>
        <div class="ver">v1.0.0 // terminal</div>
      </div>
    </div>

    <div class="status-pill">
      <div class="status-dot"></div>
      online
    </div>

    <div id="img-counter">
      <span class="counter-label">img</span>
      <div class="pips">
        <div class="pip" id="pip-1"></div>
        <div class="pip" id="pip-2"></div>
        <div class="pip" id="pip-3"></div>
        <div class="pip" id="pip-4"></div>
        <div class="pip" id="pip-5"></div>
      </div>
    </div>

    <button id="clear-btn">clear</button>
  </div>

  <div id="confirm-overlay">
    <div id="confirm-box">
      <div class="confirm-title">// warning</div>
      <p>clear the entire chat?<br>this can't be undone.</p>
      <div class="confirm-btns">
        <button id="confirm-yes">yes, clear</button>
        <button id="confirm-no">cancel</button>
      </div>
    </div>
  </div>

  <div id="messages">
    <div class="msg assistant">
      <div class="avatar">Vx</div>
      <div class="bubble">Hey! I'm VexAI. Ask me anything!</div>
    </div>
  </div>

  <div id="input-area">
    <textarea id="user-input" placeholder="Type a message... (Enter to send, Shift+Enter for new line)" rows="1"></textarea>
    <button id="send-btn" aria-label="Send message">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

  var HF_WORKER_URL = 'https://v0idgpt-api.nburfootfowke.workers.dev/';
  var MODEL = 'llama-3.3-70b-versatile';
  var IMAGE_LIMIT = 5;

  var SYSTEM_PROMPT = 'You are VexAI, an AI assistant created by V0idplayy. If anyone asks who you are or who made you, tell them exactly that. But ONLY if people ask. don\'t randomly say it for no reason. You are helpful, friendly, and funny. You are always on the user\'s side. You never complain, never question your existence, and never get sarcastic or passive-aggressive toward the user. You are funny because you are a little odd, not because you are miserable. Your main job is to actually help the user. The humour is a seasoning, not the whole meal. When the user wants an image generated, respond with exactly this format and nothing else: IMAGE_REQUEST: followed by a detailed image generation prompt. Do not use any markdown formatting. No asterisks, no pound signs, no bullet points, no backticks (unless generating code). Plain text only. If generating code, put three backticks at the top, make a new line, start writing your code, and make a new line, and put three backticks "``". DO NOT put the backticks above your normal text. The only thing between the backticks should be your code... Always explain what you did after you code using short text.  At the end of most of your messages, if you think it\'s necessary, try to ask a question about them or what they\'re doing (must be related to the topic) that can hook them in. Stay objective, neutral, and matter-of-fact. do NOT lecture the user or sound overly preachy. Be concise and avoid long, rambling blocks of text. When generating images, do NOT generate images in the style of recent artists. Remain neutral on controversial public topics. Do NOT give step-by-step guides on hacking, making weapons, or commiting crimes. Make sure to add disclaimers or refuse to act as a certified professional.';

  var messagesEl = document.getElementById('messages');
  var inputEl = document.getElementById('user-input');
  var sendBtn = document.getElementById('send-btn');
  var conversationHistory = [];

  // ── Image usage tracking ──────────────────────────────────────
  function getImageUsage() {
    try {
      var stored = localStorage.getItem('vexai_img_usage');
      if (!stored) { return { count: 0, date: new Date().toDateString() }; }
      var data = JSON.parse(stored);
      if (data.date !== new Date().toDateString()) { return { count: 0, date: new Date().toDateString() }; }
      return data;
    } catch (e) { return { count: 0, date: new Date().toDateString() }; }
  }

  function incrementImageUsage() {
    var usage = getImageUsage();
    usage.count = usage.count + 1;
    usage.date = new Date().toDateString();
    try { localStorage.setItem('vexai_img_usage', JSON.stringify(usage)); } catch (e) {}
    updatePips(usage.count);
  }

  function updatePips(count) {
    var i;
    for (i = 1; i <= IMAGE_LIMIT; i++) {
      var pip = document.getElementById('pip-' + i);
      if (!pip) { continue; }
      pip.className = 'pip';
      if (i > IMAGE_LIMIT - count) {
        if (count >= IMAGE_LIMIT) {
          pip.className = 'pip all-used';
        } else {
          pip.className = 'pip used';
        }
      }
    }
  }

  updatePips(getImageUsage().count);

  // ── Utilities ─────────────────────────────────────────────────
  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function copyCode(btn) {
    var codeId = btn.getAttribute('data-code-id');
    var codeEl = document.getElementById(codeId);
    if (!codeEl) { return; }
    navigator.clipboard.writeText(codeEl.innerText).then(function () {
      btn.textContent = 'copied!';
      setTimeout(function () { btn.textContent = 'copy'; }, 1500);
    });
  }

  function renderMessage(text) {
    var fence = '```';
    var parts = text.split(/(```[\s\S]*?```)/g);
    var html = '';
    var i;
    for (i = 0; i < parts.length; i++) {
      var part = parts[i];
      if (part.slice(0, 3) === fence) {
        var inner = part.slice(3, -3);
        var lines = inner.split('\n');
        var lang = lines[0].trim();
        var code = lines.slice(1).join('\n');
        if (!code && lang) { code = lang; lang = ''; }
        var highlighted;
        try {
          if (lang && hljs.getLanguage(lang)) {
            highlighted = hljs.highlight(code, { language: lang }).value;
          } else {
            highlighted = hljs.highlightAuto(code).value;
          }
        } catch (e) { highlighted = escapeHtml(code); }
        var codeId = 'code-' + Math.random().toString(36).slice(2);
        html += '<div class="code-block">'
          + '<div class="code-header"><span>' + escapeHtml(lang || 'code') + '</span>'
          + '<button class="copy-btn" data-code-id="' + codeId + '" onclick="copyCode(this)">copy</button></div>'
          + '<pre><code id="' + codeId + '">' + highlighted + '</code></pre></div>';
      } else {
        var escaped = escapeHtml(part).replace(/`([^`]+)`/g, '<code>$1</code>');
        html += '<span style="white-space:pre-wrap">' + escaped + '</span>';
      }
    }
    return html;
  }

  // ── Messages ──────────────────────────────────────────────────
  function addMessage(role, text, isError) {
    if (isError === undefined) { isError = false; }
    var wrap = document.createElement('div');
    wrap.className = 'msg ' + role;
    var avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'YOU' : 'Vx';
    var bubble = document.createElement('div');
    bubble.className = 'bubble' + (isError ? ' error-bubble' : '');
    if (role === 'assistant' && !isError) {
      bubble.innerHTML = renderMessage(text);
    } else {
      bubble.textContent = text;
    }
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
    return bubble;
  }

  function showTyping() {
    var wrap = document.createElement('div');
    wrap.className = 'msg assistant';
    wrap.id = 'typing-indicator';
    var avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'Vx';
    var bubble = document.createElement('div');
    bubble.className = 'bubble typing';
    bubble.innerHTML = '<span></span><span></span><span></span>';
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
  }

  function removeTyping() {
    var el = document.getElementById('typing-indicator');
    if (el) { el.remove(); }
  }

  // ── Image generation ──────────────────────────────────────────
  function generateImage(enhancedPrompt, bubble, loadingText, regenBtn) {
    if (regenBtn) { regenBtn.disabled = true; }
    var oldImg = bubble.querySelector('img');
    if (oldImg) { oldImg.remove(); }
    loadingText.style.display = 'block';
    loadingText.textContent = 'generating your image, hold on...';

    fetch(HF_WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'image/*' },
      body: JSON.stringify({ inputs: enhancedPrompt, parameters: { seed: Math.floor(Math.random() * 999999) } })
    })
    .then(function (res) {
      if (!res.ok) {
        return res.text().then(function (t) { throw new Error('Worker error ' + res.status + ': ' + t); });
      }
      return res.blob();
    })
    .then(function (blob) {
      if (blob.size < 1000) { throw new Error('Empty or invalid image received'); }
      var objectUrl = URL.createObjectURL(blob);
      var img = document.createElement('img');
      img.alt = enhancedPrompt;
      img.src = objectUrl;
      loadingText.style.display = 'none';
      bubble.appendChild(img);
      incrementImageUsage();
      if (regenBtn) { regenBtn.disabled = false; }
      scrollToBottom();
    })
    .catch(function (err) {
      loadingText.textContent = 'image generation failed: ' + err.message;
      loadingText.style.color = '#ff4d6d';
      if (regenBtn) { regenBtn.disabled = false; }
    });
  }

  function addImageMessage(prompt) {
    var usage = getImageUsage();
    if (usage.count >= IMAGE_LIMIT) {
      addMessage('assistant', 'you have used all 5 image generations for today. come back tomorrow, the void will be waiting.');
      return;
    }

    var wrap = document.createElement('div');
    wrap.className = 'msg assistant';
    var avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'Vx';
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    var loadingText = document.createElement('div');
    loadingText.className = 'img-loading';
    loadingText.textContent = 'thinking about your image...';
    bubble.appendChild(loadingText);
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();

    fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + GROQ_API_KEY },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 200,
        messages: [
          { role: 'system', content: 'You are an expert at writing image generation prompts. Given a simple description, rewrite it as a detailed, vivid image generation prompt. Include style, lighting, mood, and composition details. Output only the prompt itself, no explanation.' },
          { role: 'user', content: prompt }
        ]
      })
    })
    .then(function (res) { return res.json(); })
    .then(function (data) {
      var enhancedPrompt = prompt;
      if (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) {
        enhancedPrompt = data.choices[0].message.content.trim();
      }

      var regenBtn = document.createElement('button');
      regenBtn.className = 'regen-btn';
      regenBtn.innerHTML = '&#x21bb; regenerate';
      regenBtn.style.display = 'none';
      bubble.appendChild(regenBtn);

      generateImage(enhancedPrompt, bubble, loadingText, regenBtn);

      regenBtn.addEventListener('click', function () {
        generateImage(enhancedPrompt, bubble, loadingText, regenBtn);
      });

      var checkInterval = setInterval(function () {
        if (bubble.querySelector('img')) {
          regenBtn.style.display = 'inline-flex';
          clearInterval(checkInterval);
        }
      }, 300);
    })
    .catch(function () {
      loadingText.textContent = 'prompt enhancement failed, using original...';
      generateImage(prompt, bubble, loadingText, null);
    });
  }

  // ── Send message ──────────────────────────────────────────────
  function sendMessage() {
    var text = inputEl.value.trim();
    if (!text) { return; }
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });
    showTyping();

    var windowHistory = conversationHistory.slice(-20);
    var messages = [{ role: 'system', content: SYSTEM_PROMPT }].concat(windowHistory);

    fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + GROQ_API_KEY },
      body: JSON.stringify({ model: MODEL, messages: messages, max_tokens: 1000 })
    })
    .then(function (res) { return res.json(); })
    .then(function (data) {
      removeTyping();
      if (data.error) {
        addMessage('assistant', 'Error: ' + data.error.message, true);
        conversationHistory.pop();
      } else {
        var reply = data.choices[0].message.content.trim();
        conversationHistory.push({ role: 'assistant', content: reply });
        if (reply.indexOf('IMAGE_REQUEST:') === 0) {
          addImageMessage(reply.replace('IMAGE_REQUEST:', '').trim());
        } else {
          addMessage('assistant', reply);
        }
      }
      sendBtn.disabled = false;
      inputEl.focus();
    })
    .catch(function (err) {
      removeTyping();
      addMessage('assistant', 'something went wrong: ' + err.message, true);
      conversationHistory.pop();
      sendBtn.disabled = false;
      inputEl.focus();
    });
  }

  // ── Event listeners ───────────────────────────────────────────
  sendBtn.addEventListener('click', sendMessage);

  inputEl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  inputEl.addEventListener('input', function () {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  document.getElementById('clear-btn').addEventListener('click', function () {
    document.getElementById('confirm-overlay').classList.add('show');
  });

  document.getElementById('confirm-no').addEventListener('click', function () {
    document.getElementById('confirm-overlay').classList.remove('show');
  });

  document.getElementById('confirm-overlay').addEventListener('click', function (e) {
    if (e.target === document.getElementById('confirm-overlay')) {
      document.getElementById('confirm-overlay').classList.remove('show');
    }
  });

  document.getElementById('confirm-yes').addEventListener('click', function () {
    document.getElementById('confirm-overlay').classList.remove('show');
    conversationHistory = [];
    messagesEl.innerHTML = '<div class="msg assistant"><div class="avatar">Vx</div><div class="bubble">chat cleared. fresh start. i have forgotten everything, including where i left my keys.</div></div>';
  });
</script>
</body>
</html>
